<link href="https://fonts.googleapis.com/css?family=Rationale" rel="stylesheet">
<style>
	.form-slider {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		overflow: hidden;
		background-color: #000;
	}

	.slider-container {
		position: relative;
		width: 100vw;
		height: 100vh;
		font: 1em 'Rationale', sans-serif;
	}

	.slider {
		width: 100%;
		height: 100%;
		overflow: hidden;
	}

	.img {
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		display: flex;
		perspective: 1000px;
		pointer-events: none;
	}

	/* Fragment Styling */
	.frag {
		flex: 1;
		height: 100%;
		opacity: 0;
		z-index: 0;
		background-size: 300% 100%;
		/* Important for spanning 3 fragments */
		background-repeat: no-repeat;
		transform-origin: center right;
		transform: rotateY(90deg) translateZ(100px) scale(1.5);
		transition: transform .8s, opacity .8s, filter 2s ease-out;
		filter: saturate(0) blur(10px) brightness(.6) contrast(4);
	}

	/* Photo Sources */
	.img1 .frag {
		background-image: url('static/images/slideshow/kd-artist-mtb3.jpg');
	}

	.img2 .frag {
		background-image: url('static/images/slideshow/kd-artist-mtb2.jpg');
	}

	.img3 .frag {
		background-image: url('static/images/slideshow/kd-artist-mtb1.jpg');
	}

	/* Align background for 3 fragments */
	.frag1 {
		background-position: 0% 0%;
	}

	.frag2 {
		background-position: 50% 0%;
		transition-delay: .2s;
	}

	.frag3 {
		background-position: 100% 0%;
		transition-delay: .4s;
	}

	/* Active Transition State */
	.img.active .frag {
		transform: rotateY(0) translateZ(0) scale(1);
		filter: saturate(1) blur(0) brightness(1) contrast(1);
		opacity: 1;
		z-index: 1;
	}

	.caption {
		position: absolute;
		right: 5vw;
		bottom: 8vh;
		color: white;
		font-size: 5rem;
		z-index: 10;
		text-transform: uppercase;
		opacity: 0;
		transition: opacity 1.5s;
		text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
	}

	.img.active .caption {
		opacity: 1;
	}
</style>
<div class="form-slider">

	<div class="slider-container">
		<div class="slider">
			<div class="img img1 active">
				<div class="frag frag1"></div>
				<div class="frag frag2"></div>
				<div class="frag frag3"></div>
				<div class="caption">Forks</div>
			</div>

			<div class="img img2">
				<div class="frag frag1"></div>
				<div class="frag frag2"></div>
				<div class="frag frag3"></div>
				<div class="caption">Shocks</div>
			</div>

			<div class="img img3">
				<div class="frag frag1"></div>
				<div class="frag frag2"></div>
				<div class="frag frag3"></div>
				<div class="caption">Droppers</div>
			</div>
		</div>
	</div>

	<script>
		const slides = document.querySelectorAll('.img');
		let currentSlide = 0;

		function nextSlide() {
			slides[currentSlide].classList.remove('active');
			currentSlide = (currentSlide + 1) % slides.length;
			slides[currentSlide].classList.add('active');
		}

		// Interval set to 5 seconds
		setInterval(nextSlide, 5000);
	</script>
</div>
