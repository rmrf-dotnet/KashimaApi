{% extends "base.html" %}

{% block extra_head %}
<style>
    html body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    html body > footer {
        margin-top: auto;
    }
    footer.mt-20 {
        margin-top: auto !important
    }
</style>
{% endblock %}

{% block title %}Register - Kashima Research API{% endblock %}

{% block content %}

<link rel="stylesheet" href="/static/css/slideshow.css">

<div class="form-slider">
	<div class="slider-container">
		<div class="slider">
			<div class="img img1 active">
				<div class="frag frag1"></div>
				<div class="frag frag2"></div>
				<div class="frag frag3"></div>
				<div class="caption">Forks</div>
			</div>
			<div class="img img2">
				<div class="frag frag1"></div>
				<div class="frag frag2"></div>
				<div class="frag frag3"></div>
				<div class="caption">Shocks</div>
			</div>
			<div class="img img3">
				<div class="frag frag1"></div>
				<div class="frag frag2"></div>
				<div class="frag frag3"></div>
				<div class="caption">Droppers</div>
			</div>
		</div>
	</div>
	<script>
		const slides = document.querySelectorAll('.img');
		let currentSlide = 0;
		function nextSlide() {
			slides[currentSlide].classList.remove('active');
			currentSlide = (currentSlide + 1) % slides.length;
			slides[currentSlide].classList.add('active');
		}
		setInterval(nextSlide, 5000);
	</script>
</div>

<div class="max-w-md mx-auto px-4 py-8 z-10">
    <div class="bg-white/5 border border-white/10 rounded-2xl p-8">
        <div class="text-center mb-8">
            <div class="w-12 h-12 kashima-gradient rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-kashima-dark font-bold text-xl">K</span>
            </div>
            <h1 class="text-2xl font-bold text-white">Create Account</h1>
            <p class="text-white/60">Get your free API key</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-white/80 text-sm font-medium mb-2">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-kashima-gold">
            </div>
            
            <div>
                <label class="block text-white/80 text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-kashima-gold">
            </div>
            
            <div>
                <label class="block text-white/80 text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-kashima-gold">
            </div>
            
            <button type="submit" class="w-full py-3 kashima-gradient text-kashima-dark font-semibold rounded-xl hover:opacity-90 transition">
                Create Account
            </button>
        </form>
        
        <p class="text-center text-white/60 text-sm mt-6">
            Already have an account? 
            <a href="/login" class="text-kashima-gold hover:underline">Login</a>
        </p>
    </div>
</div>
{% endblock %}
